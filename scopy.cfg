MEMORY {
    HDR1:  start = $0000, size = $0006, file = %O, fill = no;
    MSEG1: start = $2F00, size = $00A4, file = %O, fill = no;
    HDR2:  start = $0000, size = $0004, file = %O, fill = no;
    MSEG2: start = $3400, size = $0BEA, file = %O, fill = no;
    RSEG2: start = $F400, size = $0BEA, file = "", fill = no;
    HDR3:  start = $0000, size = $0004, file = %O, fill = no;
    MSEG3: start = $3FFA, size = $0006, file = %O, fill = no;
    HDRR:  start = $0000, size = $0006, file = %O, fill = no;
}
SEGMENTS {
    HEADER1: load = HDR1,  type = ro;
    SEG1:    load = MSEG1, type = ro;
    HEADER2: load = HDR2,  type = ro;
    SEG2:    load = MSEG2, run = RSEG2, type = ro;
    HEADER3: load = HDR3,  type = ro;
    SEG3:    load = MSEG3, type = ro;
    RUNAD:   load = HDRR,  type = ro;
}
